<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch AI - Movie Recommendations</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            background: linear-gradient(to right, #0f172a, #1e293b, #0f172a);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
        }

        h1 {
            margin: 0;
            font-size: 3rem;
            background: -webkit-linear-gradient(45deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p.subtitle {
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-size: 1.1rem;
        }

        .container {
            width: 90%;
            max-width: 1200px;
        }

        .controls {
            background-color: var(--surface-color);
            padding: 2rem;
            border-radius: 16px;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            margin-bottom: 3rem;
        }

        select, button {
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            border-radius: 8px;
            border: none;
            outline: none;
            font-family: inherit;
        }

        select {
            flex: 1;
            min-width: 250px;
            background-color: #334155;
            color: white;
            cursor: pointer;
            appearance: none;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 2rem;
            padding-bottom: 4rem;
        }

        .movie-card {
            background-color: var(--surface-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .movie-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            background-color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .poster.loading::after {
            content: "Loading Poster...";
            color: var(--text-secondary);
            position: absolute;
        }

        .info {
            padding: 1.2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .info h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.2rem;
            color: var(--text-main);
        }

        .info p.genres {
            font-size: 0.85rem;
            color: var(--primary-color);
            margin: 0;
            opacity: 0.9;
        }

        .loader {
            display: none;
            text-align: center;
            width: 100%;
            padding: 3rem;
            font-size: 1.5rem;
            color: var(--primary-color);
        }

        /* simple spinner */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--primary-color);
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <h1>CineMatch AI</h1>
        <p class="subtitle">Discover your next favorite movie using Graph Algorithms</p>
    </header>

    <div class="container">
        <div class="controls">
            <select id="movieSelect">
                <!-- populated from backend -->
                {% for movie in movies %}
                <option value="{{ movie }}">{{ movie }}</option>
                {% endfor %}
            </select>
            
            <select id="algoSelect">
                <option value="BFS">BFS (Broad Similarities)</option>
                <option value="DFS">DFS (Deep Exploration)</option>
                <option value="UCS">UCS (Cost-based Optimal Similarity)</option>
            </select>

            <button onclick="getRecommendations()">Get Recommendations</button>
        </div>

        <div id="loader" class="loader">
            <div class="spinner"></div> Finding the perfect movies...
        </div>

        <div id="results" class="results">
            <!-- Results injected here -->
        </div>
    </div>

    <script>
        // Use wikipedia API for images since dataset does not have posters
        async function fetchPoster(title, imgElement) {
            try {
                // Remove trailing dates in parentheses like (2009 film) if added, or just search
                let cleanTitle = encodeURIComponent(title);
                const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${cleanTitle}&prop=pageimages&format=json&pithumbsize=500&origin=*`);
                const data = await res.json();
                const pages = data.query.pages;
                const pageId = Object.keys(pages)[0];
                if (pageId != -1 && pages[pageId].thumbnail) {
                    imgElement.src = pages[pageId].thumbnail.source;
                    imgElement.classList.remove('loading');
                } else {
                    // Try adding ' (film)'
                    const res2 = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${cleanTitle}%20(film)&prop=pageimages&format=json&pithumbsize=500&origin=*`);
                    const data2 = await res2.json();
                    const pages2 = data2.query.pages;
                    const pageId2 = Object.keys(pages2)[0];
                    if (pageId2 != -1 && pages2[pageId2].thumbnail) {
                        imgElement.src = pages2[pageId2].thumbnail.source;
                        imgElement.classList.remove('loading');
                    } else {
                        // Fallback image using UI avatars
                        imgElement.src = `https://ui-avatars.com/api/?name=${cleanTitle}&background=334155&color=fff&size=500`;
                        imgElement.classList.remove('loading');
                    }
                }
            } catch (err) {
                imgElement.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(title)}&background=334155&color=fff&size=500`;
                imgElement.classList.remove('loading');
            }
        }

        async function getRecommendations() {
            const movie = document.getElementById('movieSelect').value;
            const algo = document.getElementById('algoSelect').value;
            
            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');
            
            resultsDiv.innerHTML = '';
            loader.style.display = 'block';

            try {
                const response = await fetch('/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ movie: movie, algo: algo })
                });
                
                const data = await response.json();
                loader.style.display = 'none';
                
                if(data.length === 0) {
                    resultsDiv.innerHTML = '<p style="text-align:center; width:100%; color:var(--text-secondary);">No recommendations found. Try another movie.</p>';
                    return;
                }

                data.forEach(m => {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    
                    const img = document.createElement('img');
                    img.className = 'poster loading';
                    fetchPoster(m.title, img); // Async fetch
                    
                    const info = document.createElement('div');
                    info.className = 'info';
                    
                    const title = document.createElement('h3');
                    title.textContent = m.title;
                    
                    const genres = document.createElement('p');
                    genres.className = 'genres';
                    genres.textContent = m.genres.slice(0, 3).join(', '); // Show up to 3 genres
                    
                    info.appendChild(title);
                    info.appendChild(genres);
                    card.appendChild(img);
                    card.appendChild(info);
                    
                    resultsDiv.appendChild(card);
                });

            } catch(e) {
                loader.style.display = 'none';
                alert('Error fetching recommendations');
            }
        }
    </script>
</body>
</html>
